version: '3.8'

services:
  # ─── SERVICE 1: REDIS BACKGROUND MESSAGE BROKER ─────────────────────────
  redis_broker:
    image: redis:7-alpine
    container_name: ai_redis_broker
    ports:
      - "6373:6379" # Explicitly maps internal Redis port to your custom 6373 local framework port
    networks:
      - saas_network
    restart: always

  # ─── SERVICE 2: FASTAPI FULL-STACK BACKEND ENGINE ───────────────────────
  api_server:
    build: .
    container_name: ai_api_server
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis_broker:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis_broker
    networks:
      - saas_network
    restart: always

  # ─── SERVICE 3: CELERY ASYNC WORKER CLUSTER ─────────────────────────────
  celery_worker:
    build: .
    container_name: ai_celery_worker
    command: celery -A tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis_broker:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis_broker
    networks:
      - saas_network
    restart: always

networks:
  saas_network:
    driver: bridge
